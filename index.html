<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NES hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }
        .header p {
            color: #8e9bbe;
            font-size: 0.9rem;
        }
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255, 204, 102, 0.15);
            border: 1px solid rgba(255, 204, 102, 0.3);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #ffdd99;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }
        .search-box {
            background: rgba(20, 28, 48, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 204, 102, 0.35);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: #ffcc66;
            box-shadow: 0 0 12px rgba(255, 204, 102, 0.2);
        }
        .search-box span {
            font-size: 1.1rem;
        }
        #searchInput {
            background: transparent;
            border: none;
            color: #f0e6d0;
            font-size: 0.9rem;
            width: 260px;
            outline: none;
        }
        #searchInput::placeholder {
            color: #6a7a9e;
        }
        .stats-badge {
            background: #1e2a3a;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffdd99;
            font-weight: 500;
            border: 1px solid rgba(255, 204, 102, 0.3);
        }
        .stats-badge span {
            color: white;
            font-weight: bold;
            margin: 0 4px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(115deg, rgba(25, 34, 55, 0.9), rgba(18, 24, 42, 0.95));
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 204, 102, 0.25);
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 204, 102, 0.12), transparent);
            transition: left 0.4s ease;
        }
        .game-card:hover::before {
            left: 100%;
        }
        .game-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: #ffcc66;
            background: linear-gradient(115deg, #1e2a44, #141c30);
            box-shadow: 0 14px 28px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 204, 102, 0.2) inset;
        }

        .game-icon {
            font-size: 2rem;
            min-width: 52px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .game-info {
            flex: 1;
        }
        .game-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f5e6c4;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .game-badge {
            background: rgba(255, 204, 102, 0.18);
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffdd99;
        }
        .arrow-hint {
            opacity: 0.5;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .game-card:hover .arrow-hint {
            opacity: 1;
            transform: translateX(3px);
            color: #ffcc66;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            color: #9eafcf;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5c6e8c;
            border-top: 1px solid rgba(255, 204, 102, 0.15);
            padding-top: 1.8rem;
        }

        /* Fullscreen Modal */
        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 10000;
            flex-direction: column;
        }
        .fullscreen-modal.active {
            display: flex;
        }
        .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 204, 102, 0.3);
            z-index: 10;
        }
        .fullscreen-title {
            color: #ffdd99;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .fullscreen-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 10px;
            transition: 0.2s;
        }
        .fullscreen-close:hover {
            color: #ffcc66;
            transform: scale(1.1);
        }
        .fullscreen-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        #fullscreenEmulator {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fullscreenEmulator canvas {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            object-fit: contain;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 0.7rem 1rem; }
            .game-icon { font-size: 1.6rem; min-width: 45px; }
            .search-box #searchInput { width: 160px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 NES HUB</h1>
    <p>Nintendo Entertainment System — classic NES game collection</p>
    <div class="badge-row">
        <div class="badge">🎮 NES Games</div>
        <div class="badge">⚡ Fullscreen Play</div>
        <div class="badge">💾 Save States</div>
        <div class="badge">🎮 Gamepad Ready</div>
    </div>
</div>

<div class="toolbar">
    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="search NES games...">
    </div>
    <div class="stats-badge">
        📚 <span id="totalCount">0</span> NES games
    </div>
</div>

<div id="gamesContainer" class="games-grid"></div>

<div class="footer">
    <span>🎮 NES Hub • Click any game to play in fullscreen</span>
</div>

<!-- Fullscreen Emulator Modal -->
<div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-header">
        <span class="fullscreen-title" id="fullscreenGameTitle">NES Emulator</span>
        <button class="fullscreen-close" id="fullscreenCloseBtn">✕</button>
    </div>
    <div class="fullscreen-content">
        <div id="fullscreenEmulator"></div>
    </div>
</div>

<script>
    // ============ GOOGLE DRIVE CONFIG (WORKING FROM ORIGINAL CODE) ============
    const FOLDER_ID = '1o48CfnNCC-nkgh4RF8W7mvinOfpELrbo';
    const API_KEY = 'AIzaSyAL1l3O7Jr8M635xZsxT3jI9yE-yp13KTc';
    
    let romLibrary = [];
    let filteredRoms = [];
    let emu = null;
    let currentRomName = '';
    let currentRomBlob = null;
    
    const CORS_PROXIES = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?'];
    
    // Fetch ROMs from Google Drive
    async function fetchDriveFolder() {
        const files = [];
        let pageToken = '';
        do {
            let url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&pageSize=1000&fields=nextPageToken,files(id,name,size)`;
            if (pageToken) url += `&pageToken=${pageToken}`;
            const response = await fetch(url);
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API request failed');
            }
            const data = await response.json();
            const validFiles = (data.files || []).filter(f => f.name.toLowerCase().endsWith(".nes"));
            files.push(...validFiles.map(f => ({
                id: f.id,
                name: f.name.replace(/(\.nes)$/i, ''),
                size: formatSize(parseInt(f.size) || 0)
            })));
            pageToken = data.nextPageToken;
        } while (pageToken);
        files.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
        return files;
    }
    
    function formatSize(bytes) {
        if (!bytes) return 'NES';
        return (bytes / 1024).toFixed(0) + ' KB';
    }
    
    // Load ROM from Google Drive by file ID
    async function loadRom(fileId, name) {
        currentRomName = name;
        const statusText = document.getElementById('status-text');
        if (statusText) statusText.textContent = `Loading ${name}...`;
        
        try {
            let blob = null;
            // Try direct download first
            try {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`);
                if (response.ok) blob = await response.blob();
            } catch (e) { console.log('Direct failed:', e); }
            
            // Try proxies if direct fails
            if (!blob || blob.size < 1000) {
                const proxyUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                for (const proxy of CORS_PROXIES) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(proxyUrl));
                        if (response.ok) {
                            const data = await response.blob();
                            if (data.size > 1000 && !data.type.includes('text/html')) {
                                blob = data;
                                break;
                            }
                            const text = await data.text();
                            if (text.includes('confirm=')) {
                                const match = text.match(/confirm=([^&"']+)/);
                                if (match) {
                                    const confirmUrl = `https://drive.google.com/uc?export=download&confirm=${match[1]}&id=${fileId}`;
                                    const confirmResp = await fetch(proxy + encodeURIComponent(confirmUrl));
                                    if (confirmResp.ok) {
                                        blob = await confirmResp.blob();
                                        if (blob.size > 1000) break;
                                    }
                                }
                            }
                        }
                    } catch (e) { console.log('Proxy failed:', e); }
                }
            }
            
            if (!blob || blob.size < 1000) throw new Error('Download failed');
            
            currentRomBlob = blob;
            launchFullscreenEmulator(URL.createObjectURL(blob), name);
            
        } catch (error) {
            console.error('Load error:', error);
            alert('Failed to load ROM: ' + error.message);
        }
    }
    
    // Launch emulator in fullscreen
    function launchFullscreenEmulator(romUrl, gameName) {
        const fullscreenModal = document.getElementById('fullscreenModal');
        const fullscreenEmulatorDiv = document.getElementById('fullscreenEmulator');
        const fullscreenGameTitle = document.getElementById('fullscreenGameTitle');
        
        fullscreenGameTitle.textContent = `${gameName} (NES)`;
        fullscreenModal.classList.add('active');
        fullscreenEmulatorDiv.innerHTML = '';
        
        window.EJS_player = '#fullscreenEmulator';
        window.EJS_core = 'nes';
        window.EJS_gameName = gameName;
        window.EJS_color = '#c41e3a';
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameUrl = romUrl;
        window.EJS_buttons = { playPause: false, restart: true, mute: false, settings: true, fullscreen: true, saveState: true, loadState: true };
        
        const oldScript = document.querySelector('script[src*="emulatorjs"][src*="loader"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    }
    
    function closeFullscreenEmulator() {
        const fullscreenModal = document.getElementById('fullscreenModal');
        const fullscreenEmulatorDiv = document.getElementById('fullscreenEmulator');
        fullscreenModal.classList.remove('active');
        fullscreenEmulatorDiv.innerHTML = '';
        if (window.EJS_emulator) {
            try { window.EJS_emulator.destroy?.(); } catch(e) {}
            window.EJS_emulator = null;
        }
    }
    
    // Render game grid
    function renderGames() {
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        let filtered = romLibrary.filter(rom => 
            rom.name.toLowerCase().includes(searchTerm)
        );
        
        document.getElementById('totalCount').innerText = filtered.length;
        const container = document.getElementById('gamesContainer');
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results">✨ no NES games found — try a different search ✨</div>`;
            return;
        }
        
        function getIcon(name) {
            if (name.includes('Mario')) return '🍄';
            if (name.includes('Zelda')) return '🗡️';
            if (name.includes('Metroid')) return '🕷️';
            if (name.includes('Castlevania')) return '🦇';
            if (name.includes('Mega Man') || name.includes('Megaman')) return '🤖';
            if (name.includes('Contra')) return '💣';
            if (name.includes('Kirby')) return '⭐';
            if (name.includes('Final Fantasy')) return '⚔️';
            if (name.includes('Dragon')) return '🐉';
            if (name.includes('Punch-Out')) return '🥊';
            if (name.includes('Ninja')) return '🥷';
            if (name.includes('Double Dragon')) return '🐉';
            if (name.includes('Battletoads')) return '🐸';
            if (name.includes('Turtle') || name.includes('TMNT')) return '🐢';
            if (name.includes('Duck')) return '🦆';
            return '🎮';
        }
        
        container.innerHTML = filtered.map(rom => `
            <div class="game-card" data-id="${rom.id}" data-name="${escapeHtml(rom.name)}">
                <div class="game-icon">${getIcon(rom.name)}</div>
                <div class="game-info">
                    <div class="game-title">
                        ${escapeHtml(rom.name)}
                        <span class="game-badge">NES</span>
                    </div>
                    <div class="arrow-hint">▶ play fullscreen</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const fileId = card.getAttribute('data-id');
                const gameName = card.getAttribute('data-name');
                loadRom(fileId, gameName);
            });
        });
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Load library on page load
    async function init() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '<div class="no-results"><div style="text-align:center"><div style="width:40px;height:40px;border:3px solid rgba(255,204,102,0.2);border-top-color:#ffcc66;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px"></div><p>Loading NES library...</p></div></div>';
        
        try {
            romLibrary = await fetchDriveFolder();
            filteredRoms = romLibrary;
            document.getElementById('totalCount').innerText = romLibrary.length;
            renderGames();
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="no-results"><p>Error loading ROMs: ${error.message}</p><p style="margin-top:10px;font-size:12px">Make sure the Google Drive folder is accessible</p></div>`;
        }
    }
    
    // Search handler
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => renderGames(), 250);
    });
    
    // Fullscreen modal controls
    document.getElementById('fullscreenCloseBtn').addEventListener('click', closeFullscreenEmulator);
    document.getElementById('fullscreenModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('fullscreenModal')) closeFullscreenEmulator();
    });
    
    document.addEventListener('keydown', (e) => {
        if (document.getElementById('fullscreenModal').classList.contains('active') && e.key === 'Escape') {
            closeFullscreenEmulator();
        }
    });
    
    // Add spin animation
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
    
    // Start
    init();
</script>
</body>
</html>
