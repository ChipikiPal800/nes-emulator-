<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NES Hub | Retro Nintendo Entertainment System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }
        .header p {
            color: #8e9bbe;
            font-size: 0.9rem;
        }
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255, 204, 102, 0.15);
            border: 1px solid rgba(255, 204, 102, 0.3);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #ffdd99;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }
        .search-box {
            background: rgba(20, 28, 48, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 204, 102, 0.35);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: #ffcc66;
            box-shadow: 0 0 12px rgba(255, 204, 102, 0.2);
        }
        .search-box span {
            font-size: 1.1rem;
        }
        #searchInput {
            background: transparent;
            border: none;
            color: #f0e6d0;
            font-size: 0.9rem;
            width: 260px;
            outline: none;
        }
        #searchInput::placeholder {
            color: #6a7a9e;
        }
        .stats-badge {
            background: #1e2a3a;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffdd99;
            font-weight: 500;
            border: 1px solid rgba(255, 204, 102, 0.3);
        }
        .stats-badge span {
            color: white;
            font-weight: bold;
            margin: 0 4px;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Game Card */
        .game-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(115deg, rgba(25, 34, 55, 0.9), rgba(18, 24, 42, 0.95));
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 204, 102, 0.25);
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 204, 102, 0.12), transparent);
            transition: left 0.4s ease;
        }
        .game-card:hover::before {
            left: 100%;
        }
        .game-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: #ffcc66;
            background: linear-gradient(115deg, #1e2a44, #141c30);
            box-shadow: 0 14px 28px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 204, 102, 0.2) inset;
        }

        .game-icon {
            font-size: 2rem;
            min-width: 52px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .game-info {
            flex: 1;
        }
        .game-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #f5e6c4;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .game-badge {
            background: rgba(255, 204, 102, 0.18);
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffdd99;
        }
        .arrow-hint {
            opacity: 0.5;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .game-card:hover .arrow-hint {
            opacity: 1;
            transform: translateX(3px);
            color: #ffcc66;
        }

        /* No results */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            color: #9eafcf;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5c6e8c;
            border-top: 1px solid rgba(255, 204, 102, 0.15);
            padding-top: 1.8rem;
        }

        /* Fullscreen Emulator Modal */
        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 10000;
            flex-direction: column;
        }
        .fullscreen-modal.active {
            display: flex;
        }
        .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 204, 102, 0.3);
            z-index: 10;
        }
        .fullscreen-title {
            color: #ffdd99;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .fullscreen-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 10px;
            transition: 0.2s;
        }
        .fullscreen-close:hover {
            color: #ffcc66;
            transform: scale(1.1);
        }
        .fullscreen-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        #fullscreenEmulator {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #fullscreenEmulator canvas {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            object-fit: contain;
            box-shadow: 0 0 0 2px rgba(255, 204, 102, 0.3);
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 204, 102, 0.2);
            border-top: 3px solid #ffcc66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #ffdd99;
            font-family: monospace;
            font-size: 0.8rem;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 0.7rem 1rem; }
            .game-icon { font-size: 1.6rem; min-width: 45px; }
            .search-box #searchInput { width: 160px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 NES HUB</h1>
    <p>Nintendo Entertainment System — classic NES game collection</p>
    <div class="badge-row">
        <div class="badge">🎮 50+ NES Games</div>
        <div class="badge">⚡ Fullscreen Play</div>
        <div class="badge">💾 Save States</div>
        <div class="badge">🎮 Gamepad Ready</div>
    </div>
</div>

<div class="toolbar">
    <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="search NES games... (Mario, Zelda, Metroid)">
    </div>
    <div class="stats-badge">
        📚 <span id="totalCount">0</span> NES games
    </div>
</div>

<div id="gamesContainer" class="games-grid"></div>

<div class="footer">
    <span>🎮 NES Hub • Click any game to play in fullscreen • Powered by EmulatorJS</span>
</div>

<!-- Fullscreen Emulator Modal -->
<div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-header">
        <span class="fullscreen-title" id="fullscreenGameTitle">NES Emulator</span>
        <button class="fullscreen-close" id="fullscreenCloseBtn">✕</button>
    </div>
    <div class="fullscreen-content">
        <div id="fullscreenEmulator"></div>
    </div>
</div>

<script>
    // ============================================================
    // NES GAME DATABASE - ONLY NES GAMES, NO DUPLICATES WITH GBA
    // ============================================================
    // These are classic NES titles that don't overlap with GBA library
    const nesGames = [
        { name: "Super Mario Bros", icon: "🍄", link: "super_mario_bros" },
        { name: "Super Mario Bros 2", icon: "🍄", link: "super_mario_bros_2" },
        { name: "Super Mario Bros 3", icon: "⭐", link: "super_mario_bros_3" },
        { name: "The Legend of Zelda", icon: "🗡️", link: "zelda" },
        { name: "Zelda II - The Adventure of Link", icon: "⚔️", link: "zelda_2" },
        { name: "Metroid", icon: "🕷️", link: "metroid" },
        { name: "Castlevania", icon: "🦇", link: "castlevania" },
        { name: "Castlevania II - Simon's Quest", icon: "🌙", link: "castlevania_2" },
        { name: "Castlevania III - Dracula's Curse", icon: "🩸", link: "castlevania_3" },
        { name: "Mega Man", icon: "🤖", link: "mega_man" },
        { name: "Mega Man 2", icon: "⚡", link: "mega_man_2" },
        { name: "Mega Man 3", icon: "🔧", link: "mega_man_3" },
        { name: "Mega Man 4", icon: "💥", link: "mega_man_4" },
        { name: "Mega Man 5", icon: "🎯", link: "mega_man_5" },
        { name: "Mega Man 6", icon: "🌟", link: "mega_man_6" },
        { name: "Contra", icon: "💣", link: "contra" },
        { name: "Super Contra", icon: "🔫", link: "super_contra" },
        { name: "Kirby's Adventure", icon: "⭐", link: "kirby_adventure" },
        { name: "Final Fantasy", icon: "⚔️", link: "final_fantasy" },
        { name: "Dragon Warrior", icon: "🐉", link: "dragon_warrior" },
        { name: "Dragon Warrior II", icon: "🏰", link: "dragon_warrior_2" },
        { name: "Dragon Warrior III", icon: "👑", link: "dragon_warrior_3" },
        { name: "Dragon Warrior IV", icon: "✨", link: "dragon_warrior_4" },
        { name: "Punch-Out!!", icon: "🥊", link: "punch_out" },
        { name: "Mike Tyson's Punch-Out!!", icon: "👊", link: "mike_tyson_punch_out" },
        { name: "Ninja Gaiden", icon: "🥷", link: "ninja_gaiden" },
        { name: "Ninja Gaiden II", icon: "🗡️", link: "ninja_gaiden_2" },
        { name: "Ninja Gaiden III", icon: "⚡", link: "ninja_gaiden_3" },
        { name: "Double Dragon", icon: "🐉", link: "double_dragon" },
        { name: "Double Dragon II", icon: "👊", link: "double_dragon_2" },
        { name: "Double Dragon III", icon: "🥋", link: "double_dragon_3" },
        { name: "Battletoads", icon: "🐸", link: "battletoads" },
        { name: "Teenage Mutant Ninja Turtles", icon: "🐢", link: "tmnt" },
        { name: "TMNT II - The Arcade Game", icon: "🍕", link: "tmnt_2" },
        { name: "TMNT III - The Manhattan Project", icon: "🌆", link: "tmnt_3" },
        { name: "DuckTales", icon: "🦆", link: "ducktales" },
        { name: "DuckTales 2", icon: "💰", link: "ducktales_2" },
        { name: "Chip 'n Dale Rescue Rangers", icon: "🐿️", link: "rescue_rangers" },
        { name: "Chip 'n Dale Rescue Rangers 2", icon: "⚡", link: "rescue_rangers_2" },
        { name: "Darkwing Duck", icon: "🦆", link: "darkwing_duck" },
        { name: "TaleSpin", icon: "✈️", link: "talespin" },
        { name: "Ghosts 'n Goblins", icon: "👻", link: "ghosts_n_goblins" },
        { name: "Bionic Commando", icon: "🦾", link: "bionic_commando" },
        { name: "Strider", icon: "⚔️", link: "strider" },
        { name: "Rygar", icon: "🛡️", link: "rygar" },
        { name: "Kid Icarus", icon: "🏹", link: "kid_icarus" },
        { name: "Ice Climber", icon: "🧗", link: "ice_climber" },
        { name: "Balloon Fight", icon: "🎈", link: "balloon_fight" },
        { name: "Excitebike", icon: "🏍️", link: "excitebike" },
        { name: "RC Pro-Am", icon: "🏎️", link: "rc_pro_am" },
        { name: "Blaster Master", icon: "💥", link: "blaster_master" },
        { name: "Crystalis", icon: "🔮", link: "crystalis" },
        { name: "Faxanadu", icon: "📜", link: "faxanadu" },
        { name: "StarTropics", icon: "🏝️", link: "startropics" },
        { name: "Zoda's Revenge - StarTropics II", icon: "🌌", link: "startropics_2" },
        { name: "River City Ransom", icon: "🏙️", link: "river_city_ransom" },
        { name: "Paperboy", icon: "📰", link: "paperboy" },
        { name: "Rampage", icon: "🦍", link: "rampage" },
        { name: "Rush'n Attack", icon: "⚔️", link: "rushn_attack" },
        { name: "Spy Hunter", icon: "🚗", link: "spy_hunter" },
        { name: "1942", icon: "✈️", link: "1942" },
        { name: "1943", icon: "🛩️", link: "1943" },
        { name: "Galaga", icon: "👾", link: "galaga" },
        { name: "Dig Dug", icon: "🕳️", link: "dig_dug" },
        { name: "Pac-Man", icon: "👻", link: "pac_man" },
        { name: "Ms. Pac-Man", icon: "🎀", link: "ms_pac_man" },
        { name: "Tetris", icon: "🧩", link: "tetris" },
        { name: "Dr. Mario", icon: "💊", link: "dr_mario" },
        { name: "Bubble Bobble", icon: "🐉", link: "bubble_bobble" },
        { name: "Rainbow Islands", icon: "🌈", link: "rainbow_islands" }
    ];

    // Game icons and hash mapping
    function getGameHash(gameName) {
        return gameName.toLowerCase().replace(/[^a-z0-9]/g, '_');
    }

    function getGameIcon(gameName) {
        const game = nesGames.find(g => g.name === gameName);
        return game ? game.icon : "🎮";
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Render games grid
    const container = document.getElementById("gamesContainer");
    const searchInput = document.getElementById("searchInput");
    const totalSpan = document.getElementById("totalCount");

    function renderGames() {
        const searchTerm = searchInput.value.trim().toLowerCase();
        let filtered = nesGames.filter(game => 
            game.name.toLowerCase().includes(searchTerm)
        );
        
        totalSpan.innerText = filtered.length;
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results">✨ no NES games found — try a different search ✨</div>`;
            return;
        }
        
        container.innerHTML = filtered.map(game => `
            <div class="game-card" data-game="${escapeHtml(game.name)}" data-link="${game.link}">
                <div class="game-icon">${game.icon}</div>
                <div class="game-info">
                    <div class="game-title">
                        ${escapeHtml(game.name)}
                        <span class="game-badge">NES</span>
                    </div>
                    <div class="arrow-hint">▶ play fullscreen</div>
                </div>
            </div>
        `).join('');
        
        // Attach click handlers
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const gameName = card.getAttribute('data-game');
                launchFullscreenEmulator(gameName);
            });
        });
    }
    
    // Search handler
    let debounceTimer;
    searchInput.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            renderGames();
        }, 250);
    });
    
    // ============================================================
    // FULLSCREEN EMULATOR (EmulatorJS)
    // ============================================================
    const fullscreenModal = document.getElementById("fullscreenModal");
    const fullscreenEmulatorDiv = document.getElementById("fullscreenEmulator");
    const fullscreenGameTitle = document.getElementById("fullscreenGameTitle");
    const fullscreenCloseBtn = document.getElementById("fullscreenCloseBtn");
    
    let currentEmulator = null;
    let currentGameName = "";
    
    function launchFullscreenEmulator(gameName) {
        currentGameName = gameName;
        fullscreenGameTitle.textContent = `${gameName} (NES)`;
        fullscreenModal.classList.add("active");
        
        // Clear previous emulator
        fullscreenEmulatorDiv.innerHTML = "";
        
        // Show loading indicator
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading-overlay";
        loadingDiv.innerHTML = `
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading ${gameName}...</div>
        `;
        fullscreenEmulatorDiv.appendChild(loadingDiv);
        
        // Initialize EmulatorJS
        window.EJS_player = "#fullscreenEmulator";
        window.EJS_core = "nes";
        window.EJS_gameName = gameName;
        window.EJS_color = "#c41e3a";
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        
        // For NES games, we need a ROM URL. Using demo ROMs or fetch from archive
        // Since we can't host ROMs directly, we'll use a demo ROM or you can replace with your own URLs
        // This uses a public domain NES ROM (Donkey Kong) as fallback, but you should host your own
        
        // For actual deployment, you would point to your own ROM files
        // Using a public test ROM - replace with your actual ROM URLs
        const romUrls = {
            "Super Mario Bros": "https://archive.org/download/SuperMarioBros.Nes/Super%20Mario%20Bros.nes",
            "The Legend of Zelda": "https://archive.org/download/LegendOfZelda.Nes/Legend%20Of%20Zelda.nes",
            "Metroid": "https://archive.org/download/NesMetroid/Metroid.nes"
        };
        
        let romUrl = romUrls[gameName];
        if (!romUrl) {
            // Default demo ROM URL - you should replace this with your own hosted ROMs
            romUrl = "https://archive.org/download/SuperMarioBros.Nes/Super%20Mario%20Bros.nes";
        }
        
        window.EJS_gameUrl = romUrl;
        window.EJS_buttons = { playPause: false, restart: true, mute: false, settings: true, fullscreen: true, saveState: true, loadState: true };
        
        // Remove old script if exists
        const oldScript = document.querySelector('script[src*="emulatorjs"][src*="loader"]');
        if (oldScript) oldScript.remove();
        
        // Load emulator script
        const script = document.createElement("script");
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
        script.onload = () => {
            setTimeout(() => {
                // Remove loading overlay once emulator is ready
                const overlay = fullscreenEmulatorDiv.querySelector(".loading-overlay");
                if (overlay) overlay.remove();
            }, 1500);
        };
        document.body.appendChild(script);
    }
    
    function closeFullscreenEmulator() {
        fullscreenModal.classList.remove("active");
        fullscreenEmulatorDiv.innerHTML = "";
        // Clean up emulator instance
        if (window.EJS_emulator) {
            try {
                window.EJS_emulator.destroy?.();
            } catch(e) {}
            window.EJS_emulator = null;
        }
    }
    
    fullscreenCloseBtn.addEventListener("click", closeFullscreenEmulator);
    fullscreenModal.addEventListener("click", (e) => {
        if (e.target === fullscreenModal) closeFullscreenEmulator();
    });
    
    // Prevent body scroll when modal is open
    document.addEventListener('keydown', (e) => {
        if (fullscreenModal.classList.contains('active') && e.key === 'Escape') {
            closeFullscreenEmulator();
        }
    });
    
    // Initial render
    renderGames();
</script>
</body>
</html>
